<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="100%">
  <rect width="800" height="300" fill="#ffffff" rx="15"/>

  <text x="250" y="100" font-family="'Helvetica Neue', Helvetica, 'Hiragino Sans', Arial, sans-serif" font-weight="bold" font-size="24" fill="#333333">
    スマホサイト、<tspan fill="#FF6B00">最短3日</tspan>で。
  </text>

  <text x="90" y="230" font-family="Arial, sans-serif" font-weight="900" font-size="180" fill="#0056B3" font-style="italic" letter-spacing="-5">3</text>

  <g transform="translate(180, 110) rotate(-15)">
    <polygon points="0,0 0,70 18,52 35,95 52,88 35,45 65,45" fill="#FF6B00" stroke="#ffffff" stroke-width="5" stroke-linejoin="round"/>
  </g>

  <text x="245" y="185" font-family="'Helvetica Neue', Helvetica, 'Hiragino Sans', Arial, sans-serif" font-weight="900" font-size="70" fill="#0056B3" letter-spacing="4">ミッカサイト</text>

  <text x="255" y="230" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#888888" letter-spacing="1">powered by Cignals</text>
</svg>
